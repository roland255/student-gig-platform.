<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigPort | Global Student Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl border">
            <h1 class="text-3xl font-black text-blue-700 text-center mb-6">GigPort.</h1>
            
            <form id="authForm" class="space-y-4">
                <div id="login-fields" class="space-y-4">
                    <input type="text" id="loginId" placeholder="Email or Nickname" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="password" id="loginPass" placeholder="Password" class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div id="signup-fields" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="fullName" placeholder="Full Name" class="p-3 border rounded-lg">
                    <input type="text" id="nickName" placeholder="Nickname (Username)" class="p-3 border rounded-lg">
                    <input type="email" id="regEmail" placeholder="Email" class="col-span-full p-3 border rounded-lg">
                    <input type="password" id="regPass" placeholder="Create Password" class="col-span-full p-3 border rounded-lg">
                </div>

                <button type="submit" id="mainBtn" class="w-full bg-blue-700 text-white p-4 rounded-xl font-bold shadow-lg">Sign In</button>
            </form>

            <button onclick="toggleAuth()" id="switchBtn" class="w-full mt-4 text-blue-700 text-sm font-bold">New user? Create Account</button>
        </div>
    </div>

    <div id="otp-screen" class="hidden min-h-screen flex items-center justify-center p-4 bg-blue-700">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-2">Verify Email</h2>
            <p class="text-gray-500 mb-6 text-sm">Enter the 6-digit code sent to your email.</p>
            <input type="text" id="otpInput" maxlength="6" placeholder="000000" class="w-full text-center text-3xl tracking-widest p-3 border-2 border-blue-100 rounded-lg mb-6 outline-none focus:border-blue-500">
            <button onclick="verifyCode()" class="w-full bg-blue-700 text-white p-3 rounded-lg font-bold">Confirm & Continue</button>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen">
        <nav class="bg-white border-b p-4 flex justify-between items-center px-8">
            <span class="text-2xl font-black text-blue-700">GigPort.</span>
            <div class="flex gap-4">
                <button class="bg-blue-700 text-white px-4 py-2 rounded-lg font-bold">Post a Gig</button>
                <button onclick="location.reload()" class="border px-4 py-2 rounded-lg">Logout</button>
            </div>
        </nav>
        <div class="p-8 max-w-5xl mx-auto">
            <h2 class="text-2xl font-bold mb-4">Marketplace</h2>
            <div class="bg-white p-12 rounded-2xl border-2 border-dashed border-gray-200 text-center text-gray-400">
                Logged in successfully! Gigs will appear here.
            </div>
        </div>
    </div>

    <script>
        let isSignup = false;
        let tempEmail = "";

        function toggleAuth() {
            isSignup = !isSignup;
            document.getElementById('login-fields').classList.toggle('hidden', isSignup);
            document.getElementById('signup-fields').classList.toggle('hidden', !isSignup);
            document.getElementById('mainBtn').innerText = isSignup ? "Create Account" : "Sign In";
            document.getElementById('switchBtn').innerText = isSignup ? "Have an account? Sign In" : "New user? Create Account";
        }

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            if (isSignup) {
                tempEmail = document.getElementById('regEmail').value;
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: tempEmail, nickname: document.getElementById('nickName').value, password: document.getElementById('regPass').value })
                });
                if (res.ok) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('otp-screen').classList.remove('hidden');
                }
            } else {
                // Login Logic
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ identifier: document.getElementById('loginId').value, password: document.getElementById('loginPass').value })
                });
                if (res.ok) showDashboard();
                else alert("Login Failed!");
            }
        };

        async function verifyCode() {
            const code = document.getElementById('otpInput').value;
            const res = await fetch('/api/verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: tempEmail, code: code })
            });
            if (res.ok) showDashboard();
            else alert("Invalid Code! (Try 123456)");
        }

        function showDashboard() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('otp-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }
    </script>
</body>
</html>
