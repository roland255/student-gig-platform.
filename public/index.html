<!DOCTYPE html>
<html>
<head>
    <title>Student Gig Platform | Group 25</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ddd; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; }
        h2 { color: #333; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Apply for a Gig</h2>
        <form id="gigForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="UniPort Email" required>
            <input type="text" id="skill" placeholder="Your Major Skill (e.g. Java, Design)" required>
            <button type="submit">Submit Information</button>
        </form>
        <p id="status" style="text-align:center; color: green;"></p>
    </div>

    <script>
        document.getElementById('gigForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            
            // Gather the data from the form
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                skill: document.getElementById('skill').value
            };

            // Send the data to your Vercel Backend
            const response = await fetch('/api/apply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                status.innerText = "Application Sent Successfully!";
                document.getElementById('gigForm').reset();
            }
        });
    </script>
</body>
</html>
