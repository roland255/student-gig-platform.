<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigPort | Secure Student Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-auto max-w-md">
            <h1 class="text-3xl font-bold text-blue-700 text-center mb-2">GigPort.</h1>
            <p class="text-gray-500 text-center mb-8">Sign in to your student account</p>
            
            <form id="loginForm" class="space-y-4">
                <input type="email" id="userEmail" placeholder="Email Address" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                <input type="password" placeholder="Password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                <div class="flex justify-between text-sm text-blue-600">
                    <a href="#" class="hover:underline">Forgot password?</a>
                </div>
                <button type="submit" class="w-full bg-blue-700 text-white p-3 rounded-lg font-bold hover:bg-blue-800 transition">Sign In</button>
            </form>

            <div class="relative my-6 text-center">
                <span class="bg-white px-4 text-gray-400 text-sm relative z-10">OR CONTINUE WITH</span>
                <hr class="absolute top-1/2 w-full border-gray-200">
            </div>

            <div class="grid grid-cols-3 gap-4 mb-6">
                <button class="border p-2 rounded-lg hover:bg-gray-50"><i class="fab fa-google text-red-500"></i></button>
                <button class="border p-2 rounded-lg hover:bg-gray-50"><i class="fab fa-github"></i></button>
                <button class="border p-2 rounded-lg hover:bg-gray-50"><i class="fab fa-apple"></i></button>
            </div>

            <p class="text-xs text-gray-400 text-center">
                By signing in, you agree to our <a href="#" class="underline">Terms & Conditions</a>
            </p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-blue-700 text-white p-4 flex justify-between items-center shadow-lg">
            <span class="text-xl font-bold">GigPort.</span>
            <div class="flex gap-4 items-center">
                <span id="userDisplay" class="text-sm border-r pr-4"></span>
                <button onclick="logout()" class="text-sm bg-blue-600 px-3 py-1 rounded">Logout</button>
            </div>
        </nav>

        <div class="max-w-4xl mx-auto p-6">
            <div class="flex border-b mb-6">
                <button onclick="switchTab('browse')" class="px-6 py-3 font-bold border-b-2 border-blue-700">Browse Gigs</button>
                <button onclick="switchTab('my-gigs')" class="px-6 py-3 font-bold text-gray-500">My Posted Gigs</button>
                <button onclick="switchTab('post')" class="ml-auto bg-green-600 text-white px-4 py-2 rounded-lg text-sm">+ Post Gig</button>
            </div>

            <div id="section-browse" class="tab-content space-y-4">
                </div>

            <div id="section-my-gigs" class="tab-content hidden space-y-4">
                <h3 class="text-lg font-bold mb-4 text-gray-700">Applications Received</h3>
                <div id="notifications-list" class="space-y-2">
                    </div>
            </div>

            <div id="section-post" class="tab-content hidden bg-white p-6 rounded-xl shadow border">
                <h2 class="text-xl font-bold mb-4">Post a New Student Gig</h2>
                <input type="text" id="gigTitle" placeholder="Job Title" class="w-full p-3 border rounded mb-4">
                <textarea id="gigDesc" placeholder="Description" class="w-full p-3 border rounded mb-4"></textarea>
                <input type="text" id="gigPay" placeholder="Payment (e.g. ₦5k)" class="w-full p-3 border rounded mb-4">
                <button onclick="submitGig()" class="w-full bg-blue-700 text-white p-3 rounded-lg font-bold">Publish</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        // AUTH LOGIC
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            currentUser = document.getElementById('userEmail').value;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('userDisplay').innerText = currentUser;
            loadGigs();
        };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('section-' + tabId).classList.remove('hidden');
        }

        async function submitGig() {
            const gig = {
                owner: currentUser,
                title: document.getElementById('gigTitle').value,
                desc: document.getElementById('gigDesc').value,
                pay: document.getElementById('gigPay').value
            };
            await fetch('/api/post-gig', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(gig)
            });
            alert("Gig Published!");
            switchTab('browse');
            loadGigs();
        }

        async function loadGigs() {
            const res = await fetch('/api/gigs');
            const data = await res.json();
            
            // Show all gigs in Browse
            document.getElementById('section-browse').innerHTML = data.map(g => `
                <div class="bg-white p-5 rounded-xl shadow-sm border flex justify-between items-center">
                    <div>
                        <h4 class="font-bold text-lg">${g.title}</h4>
                        <p class="text-gray-500 text-sm">${g.desc}</p>
                        <span class="text-green-600 font-bold text-sm">${g.pay}</span>
                    </div>
                    <button onclick="apply('${g.owner}', '${g.title}')" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-lg font-bold text-sm">Apply</button>
                </div>
            `).join('');

            // Show ONLY notifications for Gigs YOU posted
            const myApps = await fetch('/api/notifications?user=' + currentUser);
            const appData = await res.json(); // Usually a separate applications endpoint
            // Logic to filter notifications goes here in real backend
        }

        function logout() { location.reload(); }
    </script>
</body>
    </html>
