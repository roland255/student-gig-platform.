<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigPort | Global Student Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-2xl border border-slate-100">
            <h1 class="text-4xl font-black text-blue-700 text-center mb-8">GigPort.</h1>
            
            <div class="grid grid-cols-3 gap-3 mb-8">
                <button class="border p-3 rounded-xl hover:bg-slate-50 transition"><i class="fab fa-google text-red-500"></i></button>
                <button class="border p-3 rounded-xl hover:bg-slate-50 transition"><i class="fab fa-github"></i></button>
                <button class="border p-3 rounded-xl hover:bg-slate-50 transition"><i class="fab fa-apple"></i></button>
            </div>

            <form id="mainAuthForm" class="space-y-4">
                <div id="login-fields" class="space-y-4">
                    <input type="text" id="loginId" placeholder="Nickname or Email" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                    <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>

                <div id="signup-fields" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="regName" placeholder="Full Name" class="p-4 bg-slate-50 border rounded-xl outline-none">
                    <input type="text" id="regNick" placeholder="Nickname" class="p-4 bg-slate-50 border rounded-xl outline-none">
                    <input type="email" id="regEmail" placeholder="Email" class="p-4 bg-slate-50 border rounded-xl outline-none">
                    <input type="date" id="regDob" class="p-4 bg-slate-50 border rounded-xl outline-none">
                    <input type="text" id="regUni" placeholder="University" class="col-span-full p-4 bg-slate-50 border rounded-xl outline-none">
                    <input type="text" id="regCountry" placeholder="Country" class="p-4 bg-slate-50 border rounded-xl outline-none">
                    <input type="text" id="regState" placeholder="State" class="p-4 bg-slate-50 border rounded-xl outline-none">
                    <input type="text" id="regCity" placeholder="City" class="p-4 bg-slate-50 border rounded-xl outline-none">
                    <input type="password" id="regPass" placeholder="Password" class="col-span-full p-4 bg-slate-50 border rounded-xl outline-none">
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-700 text-white p-4 rounded-2xl font-black shadow-xl">Sign In</button>
            </form>
            <button onclick="switchAuth()" class="w-full mt-6 text-blue-700 font-bold" id="toggle-btn">Create an Account</button>
        </div>
    </div>

    <div id="otp-screen" class="hidden min-h-screen flex items-center justify-center bg-blue-700 p-4">
        <div class="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-sm w-full">
            <h2 class="text-2xl font-bold mb-4">Verify Identity</h2>
            <p class="text-slate-400 text-sm mb-8">Enter 123456 to confirm your student email.</p>
            <input type="text" id="otpCode" maxlength="6" class="w-full text-center text-4xl font-black tracking-widest p-4 bg-slate-50 border rounded-2xl mb-8 outline-none focus:border-blue-500">
            <button onclick="confirmOtp()" class="w-full bg-blue-700 text-white p-4 rounded-xl font-bold">Verify Code</button>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen">
        <nav class="bg-white border-b p-4 flex justify-between px-8">
            <span class="text-2xl font-black text-blue-700">GigPort.</span>
            <button onclick="location.reload()" class="bg-slate-100 px-4 py-2 rounded-lg font-bold">Sign Out</button>
        </nav>
        <div class="p-8 max-w-5xl mx-auto flex flex-col items-center gap-10">
            <div class="text-center">
                <h2 class="text-3xl font-black">Student Marketplace</h2>
                <p class="text-slate-500 mt-2">What would you like to do today?</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full">
                <div class="bg-white p-10 rounded-3xl border-2 border-blue-50 text-center hover:border-blue-500 transition cursor-pointer">
                    <i class="fas fa-briefcase text-4xl text-blue-700 mb-4"></i>
                    <h3 class="text-xl font-bold">Apply for Gigs</h3>
                    <p class="text-slate-400 text-sm mt-2">Find work and earn as a student.</p>
                </div>
                <div class="bg-white p-10 rounded-3xl border-2 border-blue-50 text-center hover:border-blue-500 transition cursor-pointer">
                    <i class="fas fa-plus-circle text-4xl text-blue-700 mb-4"></i>
                    <h3 class="text-xl font-bold">Post a Gig</h3>
                    <p class="text-slate-400 text-sm mt-2">Hire other talented students.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isSignup = false;
        let tempEmail = "";

        function switchAuth() {
            isSignup = !isSignup;
            document.getElementById('login-fields').classList.toggle('hidden', isSignup);
            document.getElementById('signup-fields').classList.toggle('hidden', !isSignup);
            document.getElementById('submitBtn').innerText = isSignup ? "Create Account" : "Sign In";
            document.getElementById('toggle-btn').innerText = isSignup ? "Already have an account? Sign In" : "Create an Account";
        }

        document.getElementById('mainAuthForm').onsubmit = async (e) => {
            e.preventDefault();
            if(isSignup) {
                tempEmail = document.getElementById('regEmail').value;
                const signupData = {
                    regName: document.getElementById('regName').value,
                    regNick: document.getElementById('regNick').value,
                    regEmail: tempEmail,
                    regDob: document.getElementById('regDob').value,
                    regUni: document.getElementById('regUni').value,
                    regCountry: document.getElementById('regCountry').value,
                    regState: document.getElementById('regState').value,
                    regCity: document.getElementById('regCity').value,
                    regPass: document.getElementById('regPass').value
                };
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(signupData)
                });
                if(res.ok) {
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('otp-screen').classList.remove('hidden');
                }
            } else {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ identifier: document.getElementById('loginId').value, password: document.getElementById('loginPass').value })
                });
                if(res.ok) showDashboard();
                else alert("Login Failed! Please verify your email or check credentials.");
            }
        };

        async function confirmOtp() {
            const res = await fetch('/api/verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: tempEmail, code: document.getElementById('otpCode').value })
            });
            if(res.ok) showDashboard();
            else alert("Invalid Code. Try 123456.");
        }

        function showDashboard() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('otp-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }
    </script>
</body>
</html>
