<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigPort | UniPort Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; }
        .sky-glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(56, 189, 248, 0.2); }
        .hidden { display: none; }
        input, textarea { color: white !important; }
    </style>
</head>
<body>

    <div id="auth-page" class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-950 via-sky-950/30 to-slate-950">
        <div class="sky-glass w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-white">Gig<span class="text-sky-400">Port</span></h1>
                <p id="auth-status" class="text-slate-400 mt-2">Welcome back, Student</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <input type="email" id="email" placeholder="UniPort Email" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl focus:ring-2 focus:ring-sky-500 outline-none transition" required>
                <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl focus:ring-2 focus:ring-sky-500 outline-none transition" required>
                
                <div id="signup-fields" class="hidden space-y-4">
                    <input type="text" id="full-name" placeholder="Full Name" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl focus:ring-2 focus:ring-sky-500 outline-none">
                    <p class="text-[10px] text-slate-500 px-2">By joining, you agree to the UniPort Marketplace <span class="text-sky-400">Terms & Conditions</span>.</p>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-4 bg-sky-600 hover:bg-sky-500 rounded-2xl font-bold shadow-lg shadow-sky-500/20 transition transform active:scale-95">Login</button>
            </form>

            <button onclick="toggleMode()" id="toggle-btn" class="w-full mt-6 text-sm text-slate-400 hover:text-sky-400 transition underline underline-offset-4">Don't have an account? Create one</button>
            
            <button onclick="alert('Password reset link sent to your student email.')" class="w-full mt-4 text-[10px] text-slate-600 hover:text-slate-400">Forgot Password?</button>
        </div>
    </div>

    <div id="dashboard-page" class="hidden min-h-screen">
        <nav class="p-6 border-b border-slate-800 flex justify-between items-center sky-glass sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <span class="text-2xl font-bold">Gig<span class="text-sky-400">Port</span></span>
                <span class="text-[10px] bg-sky-500/10 text-sky-400 border border-sky-400/20 px-2 py-0.5 rounded-full">LIVE PORTAL</span>
            </div>
            <button onclick="logout()" class="text-slate-400 hover:text-red-400 text-sm font-semibold">Sign Out</button>
        </nav>

        <main class="max-w-6xl mx-auto p-6 grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5">
                <div class="sky-glass p-6 rounded-3xl border-t-4 border-sky-500 shadow-xl">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <svg class="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Post New Gig
                    </h2>
                    <form id="gig-form" class="space-y-4">
                        <input type="text" id="g-title" placeholder="Job Title (e.g. Graphics Design)" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none focus:border-sky-500" required>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="g-price" placeholder="Price (₦)" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none focus:border-sky-500" required>
                            <input type="text" id="g-loc" placeholder="Location (e.g. Choba)" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none focus:border-sky-500" required>
                        </div>
                        <textarea id="g-desc" placeholder="Details of the job..." class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none focus:border-sky-500 h-32" required></textarea>
                        <button type="submit" id="post-btn" class="w-full py-4 bg-sky-600 hover:bg-sky-500 rounded-xl font-bold shadow-xl shadow-sky-900/40 transform active:scale-95 transition">Post Gig Successfully</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-7">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    Live Market Feed
                </h2>
                <div id="feed" class="space-y-4">
                    <div class="text-center py-20 text-slate-500">Connecting to database...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURATION WITH YOUR LINKS
        const SB_URL = 'https://ybfamugobqgkdbezkgyw.supabase.co';
        const SB_KEY = 'sb_publishable_xZtl0fMCuBuMAx0PoPQ_GA_ybiiKnIi';
        const _db = supabase.createClient(SB_URL, SB_KEY);

        let isSignup = false;

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('submit-btn').innerText = isSignup ? 'Create Account' : 'Login';
            document.getElementById('auth-status').innerText = isSignup ? 'Create your student profile' : 'Welcome back, Student';
            document.getElementById('toggle-btn').innerText = isSignup ? 'Already have an account? Login' : "Don't have an account? Create one";
        }

        // AUTH HANDLER
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');
            
            btn.innerText = isSignup ? "Creating Account..." : "Signing In...";
            
            const { data, error } = isSignup ? 
                await _db.auth.signUp({ email, password }) : 
                await _db.auth.signInWithPassword({ email, password });

            if (error) {
                alert(error.message);
                btn.innerText = isSignup ? "Create Account" : "Login";
            } else if (data.user) {
                if (isSignup && !data.session) alert("Please check your email for a confirmation link!");
                else showDashboard();
            }
        });

        function showDashboard() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('hidden');
            loadGigs();
            // REALTIME FIX: Listens for changes and updates UI automatically
            _db.channel('public:gigs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'gigs' }, loadGigs).subscribe();
        }

        // DATA HANDLER
        async function loadGigs() {
            const { data, error } = await _db.from('gigs').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('feed');
            
            if (error) {
                feed.innerHTML = `<p class="text-red-400">Error loading gigs. Check your table policies.</p>`;
                return;
            }

            if (data.length === 0) {
                feed.innerHTML = `<div class="sky-glass p-10 text-center rounded-3xl text-slate-500">No gigs posted yet.</div>`;
                return;
            }

            feed.innerHTML = data.map(g => `
                <div class="sky-glass p-6 rounded-3xl hover:border-sky-400 transition cursor-default">
                    <div class="flex justify-between items-start">
                        <h3 class="text-lg font-bold text-sky-100">${g.title}</h3>
                        <span class="text-green-400 font-bold bg-green-400/10 px-3 py-1 rounded-full text-xs">₦${Number(g.price).toLocaleString()}</span>
                    </div>
                    <p class="text-slate-400 text-sm mt-3 leading-relaxed">${g.description}</p>
                    <div class="mt-4 pt-4 border-t border-slate-800 flex justify-between text-[10px] text-slate-500 uppercase tracking-widest">
                        <span>📍 ${g.location}</span>
                        <span>🕒 ${new Date(g.created_at).toLocaleDateString()}</span>
                    </div>
                </div>
            `).join('');
        }

        // POST HANDLER
        document.getElementById('gig-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('post-btn');
            btn.innerText = "Processing...";

            const { data: { user } } = await _db.auth.getUser();
            const gig = {
                title: document.getElementById('g-title').value,
                price: document.getElementById('g-price').value,
                location: document.getElementById('g-loc').value,
                description: document.getElementById('g-desc').value,
                user_id: user.id
            };

            const { data, error } = await _db.from('gigs').insert([gig]).select();
            
            if (error) {
                alert("Error: " + error.message);
            } else {
                alert("Gig Posted Successfully!");
                document.getElementById('gig-form').reset();
                loadGigs(); // UI REFRESH FIX
            }
            btn.innerText = "Post Gig Successfully";
        });

        async function logout() { await _db.auth.signOut(); location.reload(); }

        window.onload = async () => {
            const { data: { session } } = await _db.auth.getSession();
            if (session) showDashboard();
        }
    </script>
</body>
</html>
