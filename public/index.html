<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigPort | Global Student Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>

    <style>
        .met { color: #22c55e; } 
        .unmet { color: #cbd5e1; }
        .iti { width: 100%; }
        /* Matching the styling in your screenshot */
        .custom-input {
            background-color: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 1.5rem;
            padding: 1.25rem;
            transition: all 0.2s;
        }
        .custom-input:focus {
            background-color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="min-h-screen flex items-center justify-center p-4">
        
        <div class="bg-white p-8 md:p-12 rounded-[3rem] shadow-2xl w-full max-w-4xl">
            <h1 class="text-4xl font-black text-blue-700 text-center mb-2">GigPort.</h1>
            <p class="text-center text-slate-400 font-bold text-sm mb-10">Join the global student marketplace</p>
            
            <form id="registrationForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Full Name</label>
                    <input type="text" placeholder="Roland Emereje" class="w-full custom-input outline-none" required>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nickname</label>
                    <input type="text" placeholder="Roland987" class="w-full custom-input outline-none" required>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Email Address</label>
                    <input type="email" placeholder="rolandemereje@gmail.com" class="w-full custom-input outline-none" required>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Phone Number</label>
                    <input type="tel" id="phone" class="w-full custom-input outline-none" required>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Gender</label>
                    <select class="w-full custom-input outline-none appearance-none cursor-pointer" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">University</label>
                    <input type="text" placeholder="University of Port Harcourt" class="w-full custom-input outline-none" required>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Country</label>
                    <div class="relative">
                        <select id="country" class="w-full custom-input outline-none appearance-none cursor-pointer" required>
                            <option value="">Select Country</option>
                        </select>
                        <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none"></i>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">State / Province</label>
                    <div class="relative">
                        <select id="state" class="w-full custom-input outline-none appearance-none cursor-pointer" disabled required>
                            <option value="">Select State</option>
                        </select>
                        <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none"></i>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">City</label>
                    <div class="relative">
                        <select id="city" class="w-full custom-input outline-none appearance-none cursor-pointer" disabled required>
                            <option value="">Select City</option>
                        </select>
                        <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none"></i>
                    </div>
                </div>

                <div class="md:col-span-2 lg:col-span-3 space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Secure Password</label>
                    <div class="relative">
                        <input type="password" id="regPass" oninput="checkStrength(this.value)" placeholder="••••••••" class="w-full custom-input outline-none" required>
                        <button type="button" onclick="togglePass('regPass', 'regEye')" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-300">
                            <i id="regEye" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="md:col-span-2 lg:col-span-3 flex flex-wrap gap-4 px-2">
                    <div id="val-up" class="unmet text-[9px] font-black uppercase flex items-center gap-2"><i class="fas fa-check-circle"></i> Uppercase</div>
                    <div id="val-low" class="unmet text-[9px] font-black uppercase flex items-center gap-2"><i class="fas fa-check-circle"></i> Lowercase</div>
                    <div id="val-spec" class="unmet text-[9px] font-black uppercase flex items-center gap-2"><i class="fas fa-check-circle"></i> Special</div>
                    <div id="val-len" class="unmet text-[9px] font-black uppercase flex items-center gap-2"><i class="fas fa-check-circle"></i> 8+ Characters</div>
                </div>

                <button type="submit" class="md:col-span-2 lg:col-span-3 bg-blue-700 text-white p-5 rounded-3xl font-black text-xl hover:bg-blue-800 shadow-xl transition-all active:scale-95 mt-4">
                    Create Account
                </button>
            </form>
        </div>
    </div>

    <script>
        // Initialize Phone Input
        const phoneInput = document.querySelector("#phone");
        window.intlTelInput(phoneInput, {
            initialCountry: "auto",
            geoIpLookup: callback => {
                fetch("https://ipapi.co/json").then(res => res.json()).then(data => callback(data.country_code)).catch(() => callback("us"));
            },
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
        });

        // Professional Location API Integration
        const countrySelect = document.getElementById('country');
        const stateSelect = document.getElementById('state');
        const citySelect = document.getElementById('city');

        const headers = new Headers();
        headers.append("X-CSCAPI-KEY", "NHVvS0pREU9NRE5vR0U5N2xxR3Y4emU4Y3pWRE9BS3pWb0E2S09Sdg==");

        const requestOptions = { method: 'GET', headers: headers, redirect: 'follow' };

        // 1. Load Countries
        fetch("https://api.countrystatecity.in/v1/countries", requestOptions)
            .then(response => response.json())
            .then(result => {
                result.forEach(country => {
                    let opt = document.createElement('option');
                    opt.value = country.iso2;
                    opt.innerHTML = country.name;
                    countrySelect.appendChild(opt);
                });
            })
            .catch(error => console.log('error', error));

        // 2. Load States when Country changes
        countrySelect.onchange = () => {
            stateSelect.disabled = false;
            stateSelect.innerHTML = '<option value="">Select State</option>';
            citySelect.innerHTML = '<option value="">Select City</option>';
            
            fetch(`https://api.countrystatecity.in/v1/countries/${countrySelect.value}/states`, requestOptions)
                .then(response => response.json())
                .then(result => {
                    result.forEach(state => {
                        let opt = document.createElement('option');
                        opt.value = state.iso2;
                        opt.innerHTML = state.name;
                        stateSelect.appendChild(opt);
                    });
                });
        };

        // 3. Load Cities when State changes
        stateSelect.onchange = () => {
            citySelect.disabled = false;
            citySelect.innerHTML = '<option value="">Select City</option>';
            
            fetch(`https://api.countrystatecity.in/v1/countries/${countrySelect.value}/states/${stateSelect.value}/cities`, requestOptions)
                .then(response => response.json())
                .then(result => {
                    result.forEach(city => {
                        let opt = document.createElement('option');
                        opt.value = city.name;
                        opt.innerHTML = city.name;
                        citySelect.appendChild(opt);
                    });
                });
        };

        function checkStrength(val) {
            document.getElementById('val-up').className = /[A-Z]/.test(val) ? 'met text-[9px] font-black flex items-center gap-2' : 'unmet text-[9px] font-black flex items-center gap-2';
            document.getElementById('val-low').className = /[a-z]/.test(val) ? 'met text-[9px] font-black flex items-center gap-2' : 'unmet text-[9px] font-black flex items-center gap-2';
            document.getElementById('val-spec').className = /[!@#$%^&*(),.?":{}|<>]/.test(val) ? 'met text-[9px] font-black flex items-center gap-2' : 'unmet text-[9px] font-black flex items-center gap-2';
            document.getElementById('val-len').className = val.length >= 8 ? 'met text-[9px] font-black flex items-center gap-2' : 'unmet text-[9px] font-black flex items-center gap-2';
        }

        function togglePass(id, iconId) {
            const input = document.getElementById(id);
            const icon = document.getElementById(iconId);
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('fa-eye-slash');
        }
    </script>
</body>
</html>
