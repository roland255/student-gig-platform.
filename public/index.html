<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigPort | Student Marketplace</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>

    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; --input-bg: #ffffff; }
        .dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --border: #334155; --input-bg: #334155; }
        body { background-color: var(--bg); color: var(--text); transition: all 0.3s ease; }
        .glass-card { background: var(--card); border: 1px solid var(--border); }
        .custom-input { background-color: var(--input-bg); border: 1px solid var(--border); border-radius: 1.25rem; padding: 1rem; width: 100%; outline: none; color: var(--text); }
        .hidden { display: none !important; }
        .requirement { font-size: 10px; font-weight: 900; color: #cbd5e1; }
        .requirement.met { color: #22c55e; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: #3b82f620; color: #3b82f6; }
    </style>
</head>
<body class="font-sans min-h-screen">

    <div id="auth-container" class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-4xl glass-card rounded-[3rem] shadow-2xl p-8 md:p-12">
            <div class="text-center mb-6">
                <h1 class="text-4xl font-black text-blue-600">GigPort.</h1>
                <p class="text-slate-400 font-bold text-sm">Professional Student Marketplace</p>
            </div>

            <div id="login-view">
                <form id="loginForm" class="max-w-md mx-auto space-y-4">
                    <input type="email" id="loginEmail" placeholder="Email" class="custom-input" required>
                    <input type="password" id="loginPass" placeholder="Password" class="custom-input" required>
                    <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-full font-bold">Sign In</button>
                </form>
                <p class="text-center mt-8 text-sm font-bold">New? <button onclick="toggleAuth('reg')" class="text-blue-600 underline">Create Account</button></p>
            </div>

            <div id="reg-view" class="hidden">
                <form id="regForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <input type="text" id="r-fullname" placeholder="Full Name" class="custom-input" required>
                    <input type="text" id="r-nick" placeholder="Nickname" class="custom-input" required>
                    <input type="email" id="r-email" placeholder="Email" class="custom-input" required>
                    <input type="tel" id="phone" class="custom-input" required>
                    <input type="text" id="r-uni" placeholder="University" class="custom-input" required>
                    <input type="text" id="r-state" placeholder="State" class="custom-input" required>
                    <div class="md:col-span-3">
                        <input type="password" id="regPass" oninput="validatePass(this.value)" placeholder="Strong Password" class="custom-input" required>
                        <div class="flex gap-3 mt-2 px-2">
                            <span id="up" class="requirement">ABC</span> <span id="low" class="requirement">abc</span>
                            <span id="spec" class="requirement">#@!</span> <span id="len" class="requirement">8+</span>
                        </div>
                    </div>
                    <button type="submit" id="regBtn" class="md:col-span-3 w-full bg-blue-700 text-white p-4 rounded-3xl font-black opacity-50" disabled>Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden fixed inset-0 flex overflow-hidden">
        <aside class="w-72 h-full glass-card border-r p-6">
            <h2 class="text-2xl font-black text-blue-600 mb-8">GigPort.</h2>
            <nav class="space-y-2">
                <div class="nav-link active"><i class="fas fa-th-large"></i> Job Board</div>
                <div onclick="signOut()" class="nav-link text-red-500 font-bold mt-10"><i class="fas fa-power-off"></i> Logout</div>
            </nav>
        </aside>
        <main class="flex-1 p-10 overflow-y-auto">
            <header class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black">Student Job Board</h2>
                <div id="user-badge" class="font-bold text-blue-600"></div>
            </header>
            <div id="gig-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </main>
    </div>

    <script>
        const SB_URL = 'https://ybfamugobqgkdbezkgyw.supabase.co';
        const SB_KEY = 'sb_publishable_xZtl0fMCuBuMAx0PoPQ_GA_ybiiKnIi';
        const _db = supabase.createClient(SB_URL, SB_KEY);
        let currentUser = null;

        // --- AUTOMATIC REDIRECT LOGIC ---
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('r-email').value;
            const password = document.getElementById('regPass').value;

            // Step 1: Sign Up
            const { data, error } = await _db.auth.signUp({ 
                email, password, 
                options: { data: { full_name: document.getElementById('r-fullname').value, nickname: document.getElementById('r-nick').value } }
            });

            if (error) return alert(error.message);

            if (data.user) {
                // Step 2: Create Profile
                await _db.from('profiles').insert([{ 
                    id: data.user.id, 
                    full_name: document.getElementById('r-fullname').value, 
                    nickname: document.getElementById('r-nick').value,
                    university: document.getElementById('r-uni').value
                }]);
                
                // Step 3: MOVE TO DASHBOARD IMMEDIATELY
                currentUser = data.user;
                showDashboard();
            }
        };

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const { data, error } = await _db.auth.signInWithPassword({ 
                email: document.getElementById('loginEmail').value, 
                password: document.getElementById('loginPass').value 
            });
            if (error) alert(error.message);
            else { currentUser = data.user; showDashboard(); }
        };

        function showDashboard() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-badge').innerText = `Welcome, ${currentUser.user_metadata.nickname || 'Student'}`;
            renderGigs();
        }

        async function renderGigs() {
            const { data } = await _db.from('gigs').select('*').limit(10);
            if (data) {
                document.getElementById('gig-list').innerHTML = data.map(g => `
                    <div class="glass-card p-6 rounded-[2rem] border-l-4 border-l-blue-500">
                        <h3 class="font-black text-xl text-blue-600">${g.title}</h3>
                        <p class="text-sm text-slate-500 my-2">${g.description}</p>
                        <p class="font-bold text-green-600">₦${g.price}</p>
                    </div>
                `).join('');
            }
        }

        async function signOut() { await _db.auth.signOut(); location.reload(); }
        function toggleAuth(v) { document.getElementById('login-view').classList.toggle('hidden', v === 'reg'); document.getElementById('reg-view').classList.toggle('hidden', v === 'login'); }
        function validatePass(v) {
            const up = /[A-Z]/.test(v), low = /[a-z]/.test(v), spec = /[!@#$%]/.test(v), len = v.length >= 8;
            document.getElementById('up').className = up ? 'requirement met' : 'requirement';
            document.getElementById('low').className = low ? 'requirement met' : 'requirement';
            document.getElementById('spec').className = spec ? 'requirement met' : 'requirement';
            document.getElementById('len').className = len ? 'requirement met' : 'requirement';
            const btn = document.getElementById('regBtn'); btn.disabled = !(up && low && spec && len); btn.style.opacity = btn.disabled ? "0.5" : "1";
        }
        window.onload = () => { if(document.querySelector("#phone")) window.intlTelInput(document.querySelector("#phone"), { initialCountry: "ng" }); };
    </script>
</body>
</html>
