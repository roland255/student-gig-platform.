<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigPort | UniPort Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; }
        .sky-glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(56, 189, 248, 0.2); }
        .hidden { display: none; }
        .modal-bg { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(4px); }
        input, textarea { color: white !important; }
    </style>
</head>
<body>

    <div id="auth-page" class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-950 via-sky-950/30 to-slate-950">
        <div class="sky-glass w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-white">Gig<span class="text-sky-400">Port</span></h1>
                <p id="auth-status" class="text-slate-400 mt-2">UniPort's Student Marketplace</p>
            </div>
            <form id="auth-form" class="space-y-4">
                <input type="email" id="email" placeholder="UniPort Email" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl focus:ring-2 focus:ring-sky-500 outline-none transition" required>
                <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl focus:ring-2 focus:ring-sky-500 outline-none transition" required>
                <div id="signup-fields" class="hidden space-y-4">
                    <input type="text" id="full-name" placeholder="Full Name" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl focus:ring-2 focus:ring-sky-500 outline-none">
                </div>
                <button type="submit" id="submit-btn" class="w-full py-4 bg-sky-600 hover:bg-sky-500 rounded-2xl font-bold shadow-lg shadow-sky-500/20 transition transform active:scale-95">Login</button>
            </form>
            <button onclick="toggleMode()" id="toggle-btn" class="w-full mt-6 text-sm text-slate-400 hover:text-sky-400 transition underline underline-offset-4">Don't have an account? Create one</button>
        </div>
    </div>

    <div id="dashboard-page" class="hidden min-h-screen">
        <nav class="p-6 border-b border-slate-800 flex justify-between items-center sky-glass sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <span class="text-2xl font-bold">Gig<span class="text-sky-400">Port</span></span>
                <span class="text-[10px] bg-sky-500/10 text-sky-400 border border-sky-400/20 px-2 py-0.5 rounded-full uppercase tracking-widest">Live</span>
            </div>
            <button onclick="logout()" class="text-slate-400 hover:text-red-400 text-sm font-semibold">Sign Out</button>
        </nav>

        <main class="max-w-6xl mx-auto p-6 grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5">
                <div class="sky-glass p-6 rounded-3xl border-t-4 border-sky-500 shadow-xl sticky top-28">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">Post New Gig</h2>
                    <form id="gig-form" class="space-y-4">
                        <input type="text" id="g-title" placeholder="Job Title" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none focus:border-sky-500" required>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="g-price" placeholder="Budget (₦)" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none focus:border-sky-500" required>
                            <input type="text" id="g-loc" placeholder="Location" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none focus:border-sky-500" required>
                        </div>
                        <textarea id="g-desc" placeholder="Details..." class="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none focus:border-sky-500 h-24" required></textarea>
                        <button type="submit" id="post-btn" class="w-full py-4 bg-sky-600 hover:bg-sky-500 rounded-xl font-bold shadow-xl transition active:scale-95">Post Gig Successfully</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-7">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">Available Gigs</h2>
                <div id="feed" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <div id="apply-modal" class="hidden fixed inset-0 z-[100] modal-bg flex items-center justify-center p-4">
        <div class="sky-glass w-full max-w-lg p-8 rounded-3xl relative">
            <button onclick="closeApplyModal()" class="absolute top-4 right-4 text-slate-500 hover:text-white text-xl">&times;</button>
            <h2 class="text-2xl font-bold text-sky-400 mb-2">Apply for Gig</h2>
            <p id="apply-gig-title" class="text-slate-400 text-sm mb-6 font-semibold">Gig Title Goes Here</p>
            
            <form id="apply-form" class="space-y-4">
                <input type="hidden" id="apply-gig-id">
                <textarea id="apply-pitch" placeholder="Why should you be hired for this? (e.g., I have 2 years experience in graphics...)" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl outline-none focus:border-sky-500 h-32" required></textarea>
                <input type="text" id="apply-contact" placeholder="Phone Number / WhatsApp" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl outline-none focus:border-sky-500" required>
                <button type="submit" class="w-full py-4 bg-sky-600 hover:bg-sky-500 rounded-xl font-bold shadow-lg transition active:scale-95">Send Application</button>
            </form>
        </div>
    </div>

    <script>
        const SB_URL = 'https://ybfamugobqgkdbezkgyw.supabase.co';
        const SB_KEY = 'sb_publishable_xZtl0fMCuBuMAx0PoPQ_GA_ybiiKnIi';
        const _db = supabase.createClient(SB_URL, SB_KEY);

        let isSignup = false;

        function toggleMode() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('submit-btn').innerText = isSignup ? 'Create Account' : 'Login';
            document.getElementById('toggle-btn').innerText = isSignup ? 'Already have an account? Login' : "Don't have an account? Create one";
        }

        // AUTH
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Processing...";
            const { data, error } = isSignup ? await _db.auth.signUp({ email, password }) : await _db.auth.signInWithPassword({ email, password });
            if (error) { alert(error.message); btn.innerText = isSignup ? "Create Account" : "Login"; }
            else if (data.user) showDashboard();
        });

        function showDashboard() {
            document.getElementById('auth-page').classList.add('hidden');
            document.getElementById('dashboard-page').classList.remove('hidden');
            loadGigs();
            _db.channel('public:gigs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'gigs' }, loadGigs).subscribe();
        }

        // LOAD GIGS
        async function loadGigs() {
            const { data, error } = await _db.from('gigs').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('feed');
            if (data) {
                feed.innerHTML = data.map(g => `
                    <div class="sky-glass p-6 rounded-3xl hover:border-sky-400 transition group">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-lg font-bold text-sky-100">${g.title}</h3>
                                <div class="flex gap-3 text-[10px] text-slate-500 uppercase mt-1">
                                    <span>📍 ${g.location}</span>
                                    <span>₦${Number(g.price).toLocaleString()}</span>
                                </div>
                            </div>
                            <button onclick="openApplyModal('${g.id}', '${g.title}')" class="bg-sky-600/10 hover:bg-sky-600 text-sky-400 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition">Apply Now</button>
                        </div>
                        <p class="text-slate-400 text-sm leading-relaxed">${g.description}</p>
                    </div>
                `).join('');
            }
        }

        // POST GIG
        document.getElementById('gig-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data: { user } } = await _db.auth.getUser();
            const gig = {
                title: document.getElementById('g-title').value,
                price: document.getElementById('g-price').value,
                location: document.getElementById('g-loc').value,
                description: document.getElementById('g-desc').value,
                user_id: user.id
            };
            const { error } = await _db.from('gigs').insert([gig]);
            if (error) alert(error.message);
            else { alert("Gig Posted!"); document.getElementById('gig-form').reset(); loadGigs(); }
        });

        // APPLY MODAL LOGIC
        function openApplyModal(id, title) {
            document.getElementById('apply-gig-id').value = id;
            document.getElementById('apply-gig-title').innerText = title;
            document.getElementById('apply-modal').classList.remove('hidden');
        }

        function closeApplyModal() {
            document.getElementById('apply-modal').classList.add('hidden');
            document.getElementById('apply-form').reset();
        }

        document.getElementById('apply-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data: { user } } = await _db.auth.getUser();
            const application = {
                gig_id: document.getElementById('apply-gig-id').value,
                pitch: document.getElementById('apply-pitch').value,
                contact: document.getElementById('apply-contact').value,
                applicant_id: user.id
            };
            
            // NOTE: Ensure you have an 'applications' table in Supabase
            const { error } = await _db.from('applications').insert([application]);
            
            if (error) {
                alert("Submit Error: " + error.message + ". (Make sure an 'applications' table exists in your DB!)");
            } else {
                alert("Application Sent Successfully!");
                closeApplyModal();
            }
        });

        async function logout() { await _db.auth.signOut(); location.reload(); }

        window.onload = async () => {
            const { data: { session } } = await _db.auth.getSession();
            if (session) showDashboard();
        }
    </script>
</body>
</html>
