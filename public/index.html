<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigPort | Global Student Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Password requirement visual feedback */
        .met { color: #22c55e; } /* Success green */
        .unmet { color: #94a3b8; } /* Default slate */
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        
        <div id="sign-up-box" class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-2xl border border-slate-100">
            <h1 class="text-4xl font-black text-blue-700 text-center mb-8 tracking-tight">GigPort.</h1>
            
            <div class="grid grid-cols-4 gap-4 mb-8">
                <button type="button" onclick="socialLogin('Google')" class="flex items-center justify-center p-4 border border-slate-200 rounded-2xl hover:bg-slate-50 hover:border-blue-500 transition-all">
                    <i class="fab fa-google text-red-500 text-2xl"></i>
                </button>
                <button type="button" onclick="socialLogin('GitHub')" class="flex items-center justify-center p-4 border border-slate-200 rounded-2xl hover:bg-slate-50 hover:border-blue-500 transition-all">
                    <i class="fab fa-github text-slate-900 text-2xl"></i>
                </button>
                <button type="button" onclick="socialLogin('Apple')" class="flex items-center justify-center p-4 border border-slate-200 rounded-2xl hover:bg-slate-50 hover:border-blue-500 transition-all">
                    <i class="fab fa-apple text-slate-900 text-2xl"></i>
                </button>
                <button type="button" onclick="socialLogin('Discord')" class="flex items-center justify-center p-4 border border-slate-200 rounded-2xl hover:bg-slate-50 hover:border-blue-500 transition-all">
                    <i class="fab fa-discord text-indigo-500 text-2xl"></i>
                </button>
            </div>

            <form id="registerForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" placeholder="Full Name" class="p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" required>
                <input type="text" placeholder="Nickname" class="p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" required>
                <input type="email" placeholder="Email" class="p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" required>
                
                <div class="relative">
                    <select class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none text-slate-400 appearance-none cursor-pointer">
                        <option disabled selected>Account Category</option>
                        <option>Student Freelancer</option>
                        <option>Gig Employer</option>
                    </select>
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                        <i class="fas fa-chevron-down text-xs"></i>
                    </div>
                </div>

                <input type="text" placeholder="University Name" class="col-span-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" required>
                
                <div class="col-span-full relative">
                    <input type="password" id="regPass" oninput="checkStrength(this.value)" placeholder="Password" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" required>
                    <button type="button" onclick="togglePass('regPass', 'eyeIcon')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="col-span-full grid grid-cols-2 gap-2 px-2 text-[10px] font-bold uppercase tracking-wider">
                    <div id="val-up" class="unmet"><i class="fas fa-circle text-[6px] mr-2"></i> Uppercase</div>
                    <div id="val-low" class="unmet"><i class="fas fa-circle text-[6px] mr-2"></i> Lowercase</div>
                    <div id="val-spec" class="unmet"><i class="fas fa-circle text-[6px] mr-2"></i> Special Char</div>
                    <div id="val-len" class="unmet"><i class="fas fa-circle text-[6px] mr-2"></i> 8+ Characters</div>
                </div>

                <div class="col-span-full flex items-start gap-3 px-1 mt-2">
                    <input type="checkbox" id="termsCheck" required class="mt-1 w-4 h-4 text-blue-600 border-slate-300 rounded cursor-pointer">
                    <label for="termsCheck" class="text-[12px] text-slate-500 leading-relaxed cursor-pointer">
                        I agree to the <button type="button" class="text-blue-700 font-bold underline">Terms & Conditions</button>
                    </label>
                </div>

                <button type="submit" class="col-span-full bg-blue-700 text-white p-5 rounded-2xl font-black text-lg hover:bg-blue-800 shadow-xl mt-4 transition-all">Create Account</button>
            </form>

            <button class="w-full mt-8 text-sm font-bold text-blue-700 hover:underline text-center">Already have an account? Sign In</button>
        </div>
    </div>

    <script>
        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function checkStrength(val) {
            const criteria = {
                'val-up': /[A-Z]/.test(val),
                'val-low': /[a-z]/.test(val),
                'val-spec': /[!@#$%^&*(),.?":{}|<>]/.test(val),
                'val-len': val.length >= 8
            };

            for (const [id, passed] of Object.entries(criteria)) {
                const el = document.getElementById(id);
                if (passed) {
                    el.classList.replace('unmet', 'met');
                } else {
                    el.classList.replace('met', 'unmet');
                }
            }
        }

        function socialLogin(p) { alert(`Connecting to ${p}...`); }
    </script>
</body>
</html>
