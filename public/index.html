<!DOCTYPE html>
<html>
<head>
    <title>Student Gig Platform</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid #007bff; }
        h1 { color: #007bff; }
    </style>
</head>
<body>
    <h1>Group 25 | Available Gigs</h1>
    <div id="jobs">Loading...</div>

    <script>
        async function getGigs() {
            const res = await fetch('/api/gigs');
            const data = await res.json();
            document.getElementById('jobs').innerHTML = data.map(g => `
                <div class="card">
                    <h3>${g.title}</h3>
                    <p>Pay: ${g.pay}</p>
                </div>
            `).join('');
        }
        getGigs();
    </script>
</body>
</html>
