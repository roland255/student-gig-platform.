<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigPort | Global Student Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>

    <style>
        .custom-input {
            background-color: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 1.25rem;
            padding: 1rem 1.25rem;
            width: 100%;
            outline: none;
            transition: all 0.2s ease;
        }
        .custom-input:focus {
            border-color: #3b82f6;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.05);
        }
        label {
            font-size: 0.7rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-left: 0.5rem;
            margin-bottom: 0.25rem;
            display: block;
        }
        .iti { width: 100%; }
        .met { color: #22c55e; }
        .unmet { color: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 font-sans p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white rounded-[3rem] shadow-2xl p-8 md:p-12 border border-slate-100">
        <h1 class="text-4xl font-black text-blue-700 text-center mb-1">GigPort.</h1>
        <p class="text-center text-slate-400 font-bold text-sm mb-10">Join the global student marketplace</p>

        <form id="regForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div>
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" class="custom-input" required>
            </div>
            <div>
                <label>Nickname</label>
                <input type="text" placeholder="johndoe22" class="custom-input" required>
            </div>
            <div>
                <label>Email Address</label>
                <input type="email" placeholder="name@university.edu" class="custom-input" required>
            </div>

            <div>
                <label>Phone Number</label>
                <input type="tel" id="phone" class="custom-input" required>
            </div>
            <div>
                <label>Gender</label>
                <select class="custom-input appearance-none cursor-pointer" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>
            <div>
                <label>University</label>
                <input type="text" placeholder="Stanford University" class="custom-input" required>
            </div>

            <div>
                <label>Country</label>
                <select id="country" class="custom-input appearance-none cursor-pointer" required>
                    <option value="">Select Country</option>
                </select>
            </div>
            <div>
                <label>State / Province</label>
                <select id="state" class="custom-input appearance-none cursor-pointer" disabled required>
                    <option value="">Select State</option>
                </select>
            </div>
            <div>
                <label>City</label>
                <select id="city" class="custom-input appearance-none cursor-pointer" disabled required>
                    <option value="">Select City</option>
                </select>
            </div>

            <div class="md:col-span-2 lg:col-span-3">
                <label>Secure Password</label>
                <div class="relative">
                    <input type="password" id="regPass" oninput="checkStrength(this.value)" placeholder="••••••••" class="custom-input" required>
                    <button type="button" onclick="togglePass()" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-300">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="md:col-span-2 lg:col-span-3 flex flex-wrap gap-4 px-2">
                <span id="v-up" class="unmet text-[10px] font-black uppercase"><i class="fas fa-check-circle"></i> Uppercase</span>
                <span id="v-low" class="unmet text-[10px] font-black uppercase"><i class="fas fa-check-circle"></i> Lowercase</span>
                <span id="v-spec" class="unmet text-[10px] font-black uppercase"><i class="fas fa-check-circle"></i> Special</span>
                <span id="v-len" class="unmet text-[10px] font-black uppercase"><i class="fas fa-check-circle"></i> 8+ Chars</span>
            </div>

            <button type="submit" class="md:col-span-2 lg:col-span-3 bg-blue-700 text-white p-5 rounded-3xl font-black text-xl hover:bg-blue-800 shadow-xl transition-all active:scale-95 mt-4">
                Create Account
            </button>
        </form>
    </div>

    <script>
        // 1. Initialize Phone
        const phoneInput = window.intlTelInput(document.querySelector("#phone"), {
            initialCountry: "auto",
            geoIpLookup: callback => {
                fetch("https://ipapi.co/json").then(res => res.json()).then(data => callback(data.country_code)).catch(() => callback("us"));
            },
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
        });

        // 2. Dynamic Location Logic
        const cSelect = document.getElementById('country'),
              sSelect = document.getElementById('state'),
              tSelect = document.getElementById('city');

        const apiHeaders = new Headers();
        apiHeaders.append("X-CSCAPI-KEY", "NHVvS0pREU9NRE5vR0U5N2xxR3Y4emU4Y3pWRE9BS3pWb0E2S09Sdg==");

        // Fetch Countries
        fetch("https://api.countrystatecity.in/v1/countries", { headers: apiHeaders })
            .then(res => res.json())
            .then(data => {
                data.sort((a,b) => a.name.localeCompare(b.name)).forEach(country => {
                    let opt = document.createElement('option');
                    opt.value = country.iso2;
                    opt.textContent = country.name;
                    cSelect.appendChild(opt);
                });
            });

        // Fetch States
        cSelect.onchange = () => {
            sSelect.disabled = false;
            sSelect.innerHTML = '<option value="">Select State</option>';
            tSelect.innerHTML = '<option value="">Select City</option>';
            fetch(`https://api.countrystatecity.in/v1/countries/${cSelect.value}/states`, { headers: apiHeaders })
                .then(res => res.json())
                .then(data => {
                    data.forEach(state => {
                        let opt = document.createElement('option');
                        opt.value = state.iso2;
                        opt.textContent = state.name;
                        sSelect.appendChild(opt);
                    });
                });
        };

        // Fetch Cities
        sSelect.onchange = () => {
            tSelect.disabled = false;
            tSelect.innerHTML = '<option value="">Select City</option>';
            fetch(`https://api.countrystatecity.in/v1/countries/${cSelect.value}/states/${sSelect.value}/cities`, { headers: apiHeaders })
                .then(res => res.json())
                .then(data => {
                    data.forEach(city => {
                        let opt = document.createElement('option');
                        opt.value = city.name;
                        opt.textContent = city.name;
                        tSelect.appendChild(opt);
                    });
                });
        };

        function checkStrength(v) {
            document.getElementById('v-up').className = /[A-Z]/.test(v) ? 'met text-[10px] font-black uppercase' : 'unmet text-[10px] font-black uppercase';
            document.getElementById('v-low').className = /[a-z]/.test(v) ? 'met text-[10px] font-black uppercase' : 'unmet text-[10px] font-black uppercase';
            document.getElementById('v-spec').className = /[!@#$%^&*(),.?":{}|<>]/.test(v) ? 'met text-[10px] font-black uppercase' : 'unmet text-[10px] font-black uppercase';
            document.getElementById('v-len').className = v.length >= 8 ? 'met text-[10px] font-black uppercase' : 'unmet text-[10px] font-black uppercase';
        }

        function togglePass() {
            const p = document.getElementById('regPass'), i = document.getElementById('eyeIcon');
            p.type = p.type === 'password' ? 'text' : 'password';
            i.classList.toggle('fa-eye-slash');
        }
    </script>
</body>
</html>
